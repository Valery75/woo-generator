<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WooCommerce CSV Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Mono:wght@300;400;500&display=swap');

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --gold: #c9a84c;
    --gold-light: #e4c97e;
    --text: #e8e4dc;
    --text-muted: #7a7570;
    --red: #c0392b;
    --green: #27ae60;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 32px 20px;
  }

  header { text-align: center; margin-bottom: 48px; }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(24px, 4vw, 40px);
    color: var(--gold);
    letter-spacing: 0.02em;
    margin-bottom: 8px;
  }

  header p { color: var(--text-muted); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; }

  .container { max-width: 900px; margin: 0 auto; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 28px;
    margin-bottom: 20px;
  }

  .card-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--gold);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .card-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .upload-zone {
    border: 1px dashed var(--border);
    border-radius: 2px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface2);
    position: relative;
  }

  .upload-zone:hover, .upload-zone.drag-over { border-color: var(--gold); background: #1a1810; }
  .upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-icon { font-size: 32px; margin-bottom: 12px; }
  .upload-zone p { color: var(--text-muted); font-size: 12px; }

  .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; margin-top: 16px; }
  .preview-img { aspect-ratio: 1; object-fit: cover; border-radius: 2px; border: 1px solid var(--border); width: 100%; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

  @media (max-width: 600px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

  label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted); margin-bottom: 6px; }

  input, select, textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus, select:focus, textarea:focus { border-color: var(--gold); }
  textarea { resize: vertical; min-height: 100px; line-height: 1.6; }
  select option { background: var(--surface2); }

  .sizes-input { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }

  .size-chip {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface2); border: 1px solid var(--gold);
    color: var(--gold); border-radius: 2px; padding: 4px 10px; font-size: 12px;
  }

  .size-chip button { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; padding: 0; line-height: 1; }
  .size-add { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }

  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 24px; border: none; border-radius: 2px;
    font-family: 'DM Mono', monospace; font-size: 12px;
    text-transform: uppercase; letter-spacing: 0.1em;
    cursor: pointer; transition: all 0.2s;
  }

  .btn-gold { background: var(--gold); color: #0e0e0e; font-weight: 500; }
  .btn-gold:hover { background: var(--gold-light); }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
  .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
  .btn-green { background: var(--green); color: white; }
  .btn-green:hover { background: #2ecc71; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 24px; }

  .product-item {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 2px; padding: 16px;
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 12px;
  }

  .product-item img { width: 56px; height: 56px; object-fit: cover; border-radius: 2px; flex-shrink: 0; }
  .product-info { flex: 1; min-width: 0; }
  .product-sku { font-size: 11px; color: var(--gold); text-transform: uppercase; letter-spacing: 0.1em; }
  .product-name { font-size: 13px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .product-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  .icon-btn {
    background: none; border: 1px solid var(--border); color: var(--text-muted);
    width: 32px; height: 32px; border-radius: 2px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.2s;
  }

  .icon-btn:hover { border-color: var(--red); color: var(--red); }

  .status { padding: 10px 14px; border-radius: 2px; font-size: 12px; margin-top: 12px; display: none; }
  .status.show { display: block; }
  .status.loading { background: #1a1505; border: 1px solid #3a3010; color: var(--gold); }
  .status.success { background: #0a1f0a; border: 1px solid #1a4a1a; color: #4caf50; }
  .status.error { background: #1f0a0a; border: 1px solid #4a1a1a; color: #f44336; }

  .spinner {
    display: inline-block; width: 12px; height: 12px;
    border: 2px solid var(--gold); border-top-color: transparent;
    border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .divider { height: 1px; background: var(--border); margin: 24px 0; }
  .field-group { margin-bottom: 16px; }

  .tag {
    display: inline-block; background: #1a1810; border: 1px solid var(--gold);
    color: var(--gold); font-size: 10px; padding: 2px 8px;
    border-radius: 1px; text-transform: uppercase; letter-spacing: 0.1em;
  }

  .empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); font-size: 12px; }
  .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>WooCommerce CSV Generator</h1>
    <p>kupalnik-na-more.com · Генератор товарів</p>
  </header>

  <div class="card">
    <div class="card-title">Новий товар</div>

    <div class="field-group">
      <label>Зображення товару</label>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="imageInput" accept="image/*" multiple>
        <div class="upload-icon">🖼️</div>
        <p>Перетягніть фото або натисніть для вибору</p>
      </div>
      <div class="preview-grid" id="previewGrid"></div>
    </div>

    <div class="divider"></div>

    <div class="grid-2">
      <div class="field-group">
        <label>Артикул (SKU) *</label>
        <input type="text" id="sku" placeholder="напр. 22121-12" />
      </div>
      <div class="field-group">
        <label>Бренд</label>
        <input type="text" id="brand" value="Polovy" />
      </div>
    </div>

    <div class="grid-2">
      <div class="field-group">
        <label>Тип купальника</label>
        <select id="swimType">
          <option value="Роздільний купальник">Роздільний</option>
          <option value="Суцільний купальник">Суцільний</option>
        </select>
      </div>
      <div class="field-group">
        <label>Ціна (грн) *</label>
        <input type="number" id="price" placeholder="750" />
      </div>
    </div>

    <div class="grid-3">
      <div class="field-group">
        <label>Колір (UA)</label>
        <input type="text" id="colorUa" placeholder="чорний" />
      </div>
      <div class="field-group">
        <label>Колір (slug)</label>
        <input type="text" id="colorSlug" placeholder="black" />
      </div>
      <div class="field-group">
        <label>Категорія</label>
        <input type="text" id="category" value="Купальники" />
      </div>
    </div>

    <div class="field-group">
      <label>Розміри</label>
      <div class="sizes-input" id="sizeChips"></div>
      <div class="size-add">
        <input type="text" id="sizeInput" placeholder="Додати розмір" style="max-width:160px;" />
        <button class="btn btn-outline" onclick="addSize()" style="padding:10px 14px;">+</button>
        <button class="btn btn-outline" onclick="addPreset('36-42')" style="padding:10px 12px;font-size:10px;">36–42</button>
        <button class="btn btn-outline" onclick="addPreset('40-46')" style="padding:10px 12px;font-size:10px;">40–46</button>
        <button class="btn btn-outline" onclick="addPreset('42-48')" style="padding:10px 12px;font-size:10px;">42–48</button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="field-group">
      <label>Назва товару</label>
      <input type="text" id="productName" placeholder="Буде згенеровано AI або введіть вручну" />
    </div>

    <div class="field-group">
      <label>Короткий опис (HTML)</label>
      <textarea id="shortDesc" placeholder="Буде згенеровано AI..."></textarea>
    </div>

    <div class="field-group">
      <label>Повний опис (HTML)</label>
      <textarea id="fullDesc" placeholder="Буде згенеровано AI..." style="min-height:160px;"></textarea>
    </div>

    <div id="aiStatus" class="status"></div>

    <div class="actions">
      <button class="btn btn-outline" id="aiBtn" onclick="generateWithAI()">✨ Згенерувати опис AI</button>
      <button class="btn btn-gold" onclick="addProduct()">+ Додати до списку</button>
      <button class="btn btn-outline" onclick="clearForm()">↺ Очистити</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">
      Список товарів
      <span class="tag" id="countTag">0 товарів</span>
    </div>
    <div id="productList">
      <div class="empty-state">
        <div class="empty-icon">📦</div>
        <p>Товарів поки немає</p>
      </div>
    </div>
    <div class="actions" style="margin-top:20px;">
      <button class="btn btn-green" onclick="exportCSV()" id="exportBtn" disabled>⬇ Завантажити CSV</button>
      <button class="btn btn-outline" onclick="clearAll()">🗑 Очистити список</button>
    </div>
  </div>
</div>

<script>
let products = [];
let currentImages = [];
let currentImageFiles = [];
let sizes = [];

// Image upload
const imageInput = document.getElementById('imageInput');
const uploadZone = document.getElementById('uploadZone');
const previewGrid = document.getElementById('previewGrid');

imageInput.addEventListener('change', e => handleImageFiles(Array.from(e.target.files)));
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  handleImageFiles(Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/')));
});

function handleImageFiles(files) {
  currentImageFiles = files;
  currentImages = [];
  previewGrid.innerHTML = '';
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      currentImages.push({ data: e.target.result, mime: file.type });
      const img = document.createElement('img');
      img.src = e.target.result;
      img.className = 'preview-img';
      previewGrid.appendChild(img);
    };
    reader.readAsDataURL(file);
  });
}

// Sizes
function addSize() {
  const input = document.getElementById('sizeInput');
  const val = input.value.trim();
  if (val && !sizes.includes(val)) { sizes.push(val); renderSizes(); }
  input.value = '';
}

function addPreset(range) {
  const [start, end] = range.split('-').map(Number);
  for (let i = start; i <= end; i += 2) {
    if (!sizes.includes(String(i))) sizes.push(String(i));
  }
  renderSizes();
}

function removeSize(s) { sizes = sizes.filter(x => x !== s); renderSizes(); }

function renderSizes() {
  document.getElementById('sizeChips').innerHTML = sizes.map(s =>
    `<div class="size-chip">${s}<button onclick="removeSize('${s}')">×</button></div>`
  ).join('');
}

document.getElementById('sizeInput').addEventListener('keydown', e => { if (e.key === 'Enter') addSize(); });

// AI Generation
async function generateWithAI() {
  const sku = document.getElementById('sku').value.trim();
  const brand = document.getElementById('brand').value.trim();
  const swimType = document.getElementById('swimType').value;
  const colorUa = document.getElementById('colorUa').value.trim();

  showStatus('aiStatus', 'loading', '<span class="spinner"></span>AI аналізує товар...');
  document.getElementById('aiBtn').disabled = true;

  try {
    const body = { sku, brand, swimType, colorUa, sizes };

    if (currentImages.length > 0) {
      body.imageBase64 = currentImages[0].data.split(',')[1];
      body.imageMime = currentImages[0].mime || 'image/jpeg';
    }

    const response = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    const data = await response.json();

    if (data.error) throw new Error(data.error);

    document.getElementById('productName').value = data.name || '';
    document.getElementById('shortDesc').value = data.short_desc || '';
    document.getElementById('fullDesc').value = data.full_desc || '';

    showStatus('aiStatus', 'success', '✓ Опис згенеровано — перевірте і відредагуйте за потреби');
  } catch (err) {
    showStatus('aiStatus', 'error', '❌ Помилка: ' + err.message);
  } finally {
    document.getElementById('aiBtn').disabled = false;
  }
}

function showStatus(id, type, msg) {
  const el = document.getElementById(id);
  el.className = 'status show ' + type;
  el.innerHTML = msg;
}

// Add product
function addProduct() {
  const sku = document.getElementById('sku').value.trim();
  const brand = document.getElementById('brand').value.trim() || 'Polovy';
  const swimType = document.getElementById('swimType').value;
  const colorUa = document.getElementById('colorUa').value.trim() || 'unknown';
  const colorSlug = document.getElementById('colorSlug').value.trim() || colorUa;
  const price = document.getElementById('price').value.trim();
  const category = document.getElementById('category').value.trim() || 'Купальники';
  const name = document.getElementById('productName').value.trim();
  const shortDesc = document.getElementById('shortDesc').value.trim();
  const fullDesc = document.getElementById('fullDesc').value.trim();

  if (!sku || !price || !name || sizes.length === 0) {
    alert('Заповніть: Артикул, Ціна, Назва, Розміри');
    return;
  }

  products.push({ id: Date.now(), sku, brand, swimType, colorUa, colorSlug, price, category, name, shortDesc, fullDesc, sizes: [...sizes], image: currentImages[0]?.data || null });
  renderProductList();
  clearForm();
}

function renderProductList() {
  const list = document.getElementById('productList');
  document.getElementById('countTag').textContent = products.length + ' товарів';
  document.getElementById('exportBtn').disabled = products.length === 0;

  if (!products.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📦</div><p>Товарів поки немає</p></div>`;
    return;
  }

  list.innerHTML = products.map(p => `
    <div class="product-item">
      ${p.image ? `<img src="${p.image}" alt="">` : `<div style="width:56px;height:56px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:24px;">👙</div>`}
      <div class="product-info">
        <div class="product-sku">${p.sku}-${p.colorSlug}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-meta">Розміри: ${p.sizes.join(', ')} · ${p.price} грн</div>
      </div>
      <button class="icon-btn" onclick="removeProduct(${p.id})">✕</button>
    </div>
  `).join('');
}

function removeProduct(id) { products = products.filter(p => p.id !== id); renderProductList(); }

function clearForm() {
  ['sku','colorUa','colorSlug','price','productName','shortDesc','fullDesc'].forEach(id => document.getElementById(id).value = '');
  sizes = []; renderSizes();
  currentImages = []; currentImageFiles = [];
  previewGrid.innerHTML = '';
  imageInput.value = '';
  document.getElementById('aiStatus').className = 'status';
}

function clearAll() {
  if (products.length && !confirm('Видалити всі товари?')) return;
  products = []; renderProductList();
}

// CSV Export
function exportCSV() {
  if (!products.length) return;

  const headers = ['ID','Тип','Артикул','GTIN, UPC, EAN або ISBN','Имя','Опубликован','Рекомендуемый?','Видимость в каталоге','Краткое описание','Описание','Дата начала действия скидки','Дата окончания действия скидки','Статус налога','Налоговый класс','Наличие','Запасы','Величина малых запасов','Возможен ли предзаказ?','Продано индивидуально?','Вес (кг)','Длина (см)','Ширина (см)','Высота (см)','Разрешить отзывы от клиентов?','Примечание к покупке','Акционная цена','Базовая цена','Категории','Метки','Класс доставки','Изображения','Лимит скачивания','Дней срока скачивания','Родительский','Сгруппированные товары','Апсэлы','Кросселы','Внешний URL','Текст кнопки','Позиция','Бренды','Название атрибута 1','Значения атрибутов 1','Видимость атрибута 1','Глобальный атрибут 1'];

  const rows = [headers];

  products.forEach(p => {
    const parentSku = `${p.sku}-${p.colorSlug}`;
    const catFull = `${p.category}, ${p.category} > ${p.swimType} ${p.brand}`;

    rows.push(['','variable',parentSku,'',p.name,'1','','visible',p.shortDesc,p.fullDesc,'','','','','1','','','','','','','','','','','','',catFull,'','','','','',parentSku,'','','','','','0',p.brand,'Размер',p.sizes.join(', '),'1','1']);

    p.sizes.forEach(size => {
      rows.push(['','variation',`${parentSku}-${size}`,'',`${p.name} - ${size}`,'1','','visible','','','','','','','parent','','','1','1','','','','','','','',p.price,'','','','','','',parentSku,'','','','','','1',p.brand,'Размер',size,'1','1']);
    });
  });

  const csv = rows.map(row => row.map(cell => {
    const s = String(cell ?? '');
    return (s.includes(',') || s.includes('"') || s.includes('\n')) ? '"' + s.replace(/"/g, '""') + '"' : s;
  }).join(',')).join('\n');

  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `woo-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
